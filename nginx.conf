events {
    worker_connections 1024;
}

http {
    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # ── Upstream (FastAPI running in Docker on port 8000) ─────────────────────
    upstream api {
        server 127.0.0.1:8000;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Let's Encrypt ACME challenge (needed for initial cert issuance)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS reverse proxy ───────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name _;          # Replace with your EC2 domain/Elastic IP if needed

        # TLS certificates managed by Certbot — update paths with your domain
        ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # ── Proxy all requests to FastAPI ─────────────────────────────────────
        location / {
            proxy_pass         http://api;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Large body for audio uploads (increase if needed)
            client_max_body_size 50M;

            # Timeouts (audio analysis can take 20–40 s)
            proxy_connect_timeout 60s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;
        }
    }
}
